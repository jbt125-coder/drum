<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DUAL BEAST</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

:root {
–bg: #080810;
–panel: #0f0f1a;
–panel2: #161624;
–neon: #00f2ff;
–pink: #ff3860;
–amber: #f59e0b;
–purple: #8b5cf6;
–green: #10b981;
–border: #1e1e32;
–text: #dde0f0;
–muted: #44445a;
–divider: #1a1a2e;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
width: 100%; height: 100%;
overflow: hidden;
background: var(–bg);
color: var(–text);
font-family: ‘Share Tech Mono’, monospace;
user-select: none;
-webkit-user-select: none;
-webkit-tap-highlight-color: transparent;
touch-action: none;
}

button { touch-action: manipulation; -webkit-tap-highlight-color: transparent; font-family: ‘Share Tech Mono’, monospace; }

/* ── LAYOUT ── */
#app {
display: flex;
width: 100%; height: 100%;
flex-direction: row;
}

/* ── LEFT PANEL: DRUM JOYSTICK ── */
#left-panel {
flex: 0 0 52%;
display: flex;
flex-direction: column;
border-right: 1px solid var(–border);
overflow: hidden;
background: var(–panel);
}

/* ── RIGHT PANEL: OTOMATONE ── */
#right-panel {
flex: 1;
display: flex;
flex-direction: column;
background: var(–panel);
overflow: hidden;
}

/* ── HEADER STRIPS ── */
.panel-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 5px 10px;
border-bottom: 1px solid var(–border);
background: var(–panel2);
flex-shrink: 0;
height: 32px;
}

.panel-title {
font-family: ‘Bebas Neue’, cursive;
font-size: 1rem;
letter-spacing: 0.18em;
color: var(–neon);
text-shadow: 0 0 12px rgba(0,242,255,0.5);
}

.panel-title.oto-title { color: var(–purple); text-shadow: 0 0 12px rgba(139,92,246,0.5); }

/* ── DRUM SECTION: main area ── */
#drum-main {
flex: 1;
display: flex;
flex-direction: row;
overflow: hidden;
min-height: 0;
}

/* Sidebar: drum sound list */
#drum-sidebar {
width: 72px;
flex-shrink: 0;
display: flex;
flex-direction: column;
gap: 4px;
padding: 6px 5px;
border-right: 1px solid var(–border);
overflow-y: auto;
background: var(–bg);
}

.sidebar-title {
font-size: 0.48rem;
letter-spacing: 0.15em;
color: var(–muted);
text-transform: uppercase;
text-align: center;
margin-bottom: 2px;
}

.drum-chip {
padding: 6px 4px;
border-radius: 6px;
border: 1px solid var(–border);
background: var(–panel2);
font-size: 0.6rem;
letter-spacing: 0.08em;
text-align: center;
cursor: grab;
transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
display: flex;
flex-direction: column;
align-items: center;
gap: 2px;
touch-action: none;
}
.drum-chip .chip-dot {
width: 7px; height: 7px;
border-radius: 50%;
flex-shrink: 0;
}
.drum-chip:active, .drum-chip.dragging {
opacity: 0.5;
cursor: grabbing;
}
.drum-chip.flash {
border-color: white;
background: rgba(255,255,255,0.1);
box-shadow: 0 0 10px rgba(255,255,255,0.3);
}

/* ── JOY AREA ── */
#joy-area {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
position: relative;
gap: 6px;
padding: 4px;
min-width: 0;
}

#joy-wrapper {
position: relative;
touch-action: none;
cursor: crosshair;
flex-shrink: 0;
}

.joy-base {
border-radius: 50%;
background: radial-gradient(circle at 38% 35%, #1c1c30, #0c0c18);
border: 2px solid #2a2a44;
box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 1px 4px rgba(255,255,255,0.03);
position: absolute;
inset: 0;
}

.joy-ring {
position: absolute;
border-radius: 50%;
top: 50%; left: 50%;
transform: translate(-50%, -50%);
pointer-events: none;
border: 1px dashed rgba(0,242,255,0.07);
}

#joy-glow {
position: absolute;
inset: 0;
border-radius: 50%;
pointer-events: none;
transition: box-shadow 0.06s;
}

/* Lock circles — dragged from sidebar */
.lock-circle {
position: absolute;
width: 30px; height: 30px;
border-radius: 50%;
border: 2.5px solid white;
background: rgba(255,255,255,0.05);
display: flex; align-items: center; justify-content: center;
font-size: 0.48rem;
letter-spacing: 0;
font-family: ‘Share Tech Mono’, monospace;
transform: translate(-50%, -50%);
cursor: grab;
z-index: 10;
touch-action: none;
transition: box-shadow 0.1s, background 0.1s;
pointer-events: auto;
}
.lock-circle .lc-label { pointer-events: none; color: rgba(255,255,255,0.8); font-size: 0.5rem; line-height: 1; text-align:center; }
.lock-circle .lc-del {
position: absolute;
top: -6px; right: -6px;
width: 14px; height: 14px;
border-radius: 50%;
background: var(–pink);
color: white;
font-size: 0.55rem;
display: flex; align-items: center; justify-content: center;
line-height: 1;
opacity: 0;
transition: opacity 0.15s;
pointer-events: auto;
touch-action: manipulation;
cursor: pointer;
}
.lock-circle:hover .lc-del { opacity: 1; }
.lock-circle.triggered {
background: rgba(255,255,255,0.25);
box-shadow: 0 0 14px rgba(255,255,255,0.6);
}

/* Joystick knob */
#joy-knob {
position: absolute;
border-radius: 50%;
background: radial-gradient(circle at 38% 35%, #5a5a80, #282840);
border: 2px solid rgba(255,255,255,0.15);
box-shadow: 0 4px 16px rgba(0,0,0,0.7), 0 0 0 3px rgba(255,255,255,0.04);
transform: translate(-50%, -50%);
pointer-events: none;
z-index: 20;
}
#joy-knob::after {
content: ‘’;
position: absolute;
top: 50%; left: 50%;
width: 30%; height: 30%;
border-radius: 50%;
background: rgba(255,255,255,0.13);
transform: translate(-50%,-50%);
}

/* Drop zone highlight (shows when dragging chip) */
#joy-wrapper.drop-active .joy-base {
border-color: rgba(0,242,255,0.5);
box-shadow: 0 0 20px rgba(0,242,255,0.2);
}

/* ── SPEED + PATTERN ROW ── */
#drum-bottom {
flex-shrink: 0;
padding: 5px 8px;
border-top: 1px solid var(–border);
background: var(–bg);
display: flex;
flex-direction: column;
gap: 4px;
}

.speed-row {
display: flex;
align-items: center;
gap: 8px;
}

.speed-label { font-size: 0.55rem; color: var(–muted); letter-spacing: 0.1em; white-space:nowrap; }

.speed-track {
flex: 1; height: 5px;
background: var(–panel2);
border-radius: 3px;
overflow: hidden;
border: 1px solid var(–border);
}
.speed-fill {
height: 100%; width: 0%;
border-radius: 3px;
background: linear-gradient(90deg, var(–neon), var(–pink));
transition: width 0.06s;
}

.bpm-val {
font-family: ‘Bebas Neue’, cursive;
font-size: 0.95rem;
color: var(–amber);
min-width: 44px;
text-align: right;
text-shadow: 0 0 8px rgba(245,166,35,0.4);
}

/* Beat dots */
.beat-dots {
display: flex; gap: 3px; align-items: center;
}
.beat-dot {
width: 7px; height: 7px;
border-radius: 50%;
background: var(–panel2);
border: 1px solid var(–border);
transition: all 0.05s;
flex-shrink: 0;
}
.beat-dot.on { background: var(–neon); box-shadow: 0 0 5px var(–neon); border-color: var(–neon); }
.beat-dot.ghost { background: rgba(0,242,255,0.15); border-color: rgba(0,242,255,0.3); }

/* Preset patterns */
.preset-row {
display: flex; gap: 4px; flex-wrap: wrap;
}
.preset-btn {
padding: 3px 7px;
border-radius: 4px;
border: 1px solid var(–border);
background: var(–panel2);
color: var(–muted);
font-size: 0.52rem;
letter-spacing: 0.08em;
cursor: pointer;
transition: all 0.12s;
text-transform: uppercase;
}
.preset-btn:active, .preset-btn.active {
border-color: var(–neon);
color: var(–neon);
box-shadow: 0 0 8px rgba(0,242,255,0.2);
background: rgba(0,242,255,0.06);
}

/* ── LOOPER ── */
#looper-section {
flex-shrink: 0;
padding: 5px 8px 6px;
border-top: 1px solid var(–border);
background: var(–bg);
}

.looper-title {
font-size: 0.52rem;
letter-spacing: 0.18em;
color: var(–neon);
text-transform: uppercase;
margin-bottom: 5px;
}

#looper-channels { display: flex; flex-direction: column; gap: 5px; }

.looper-channel-row {
display: flex; align-items: center; gap: 5px;
background: var(–panel2);
border-radius: 6px;
padding: 4px 7px;
border: 1px solid var(–border);
}

.ch-lbl { font-size: 0.55rem; min-width: 22px; }

.ch-btns { display: flex; gap: 4px; flex: 1; }

.lp-btn {
padding: 4px 8px;
border-radius: 4px;
border: 1px solid;
background: transparent;
font-size: 0.52rem;
font-weight: bold;
letter-spacing: 0.08em;
cursor: pointer;
transition: all 0.12s;
color: inherit;
}
.lp-btn.rec   { border-color: var(–pink); color: var(–pink); }
.lp-btn.rec.active { background: var(–pink); color: #000; box-shadow: 0 0 10px var(–pink); animation: pulse-r 1s infinite; }
.lp-btn.play  { border-color: var(–neon); color: var(–neon); }
.lp-btn.play.active { background: var(–neon); color: #000; box-shadow: 0 0 10px var(–neon); }
.lp-btn.stop  { border-color: #555; color: #555; }
.lp-btn.del   { border-color: var(–pink); color: var(–pink); }
.lp-btn.del:active { background: var(–pink); color: #000; }
.lp-btn.edit  { border-color: var(–purple); color: var(–purple); }

@keyframes pulse-r { 0%,100%{box-shadow:0 0 6px var(–pink);}50%{box-shadow:0 0 18px var(–pink);} }

.ch-progress { width: 100%; height: 5px; background: #111; border-radius: 3px; margin-top: 3px; position: relative; overflow: visible; }
.ch-progress-bar { height: 100%; width: 0%; border-radius: 3px; transition: none; opacity: 0.3; }
.ch-playhead { position: absolute; top: -2px; bottom: -2px; width: 2px; border-radius: 1px; left: 0%; transform: translateX(-50%); pointer-events: none; }

.add-ch-btn {
width: 100%; padding: 5px;
border: 1px dashed #333; border-radius: 5px;
background: transparent; color: #444;
font-family: ‘Share Tech Mono’, monospace;
font-size: 0.52rem; letter-spacing: 0.08em;
cursor: pointer; transition: all 0.15s;
margin-top: 3px;
}
.add-ch-btn:active { border-color: var(–neon); color: var(–neon); }

/* ── RIGHT PANEL INTERNALS ── */
#oto-body {
flex: 1;
display: flex;
flex-direction: row;
align-items: center;
justify-content: center;
gap: 10px;
padding: 6px 10px;
min-height: 0;
}

/* Side buttons column */
.oto-side-col {
display: flex;
flex-direction: column;
gap: 8px;
align-items: center;
}

.oto-btn {
width: 52px; height: 52px;
border-radius: 50%;
border: 2.5px solid #444;
background: #1a1a2e;
color: #888;
font-family: ‘Share Tech Mono’, monospace;
font-size: 0.55rem;
font-weight: bold;
cursor: pointer;
letter-spacing: 0.5px;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 1px;
transition: all 0.15s;
touch-action: none;
box-shadow: 0 3px 8px rgba(0,0,0,0.5);
flex-shrink: 0;
}
.oto-btn .btn-icon { font-size: 1.1rem; line-height: 1; }
.oto-btn.oct-btn  { border-color: var(–amber); color: var(–amber); }
.oto-btn.oct-btn.active { background: var(–amber); color: #000; box-shadow: 0 0 16px var(–amber); }
.oto-btn.mute-btn { border-color: var(–pink); color: var(–pink); }
.oto-btn.mute-btn.muted { background: var(–pink); color: #000; box-shadow: 0 0 16px var(–pink); }
.oto-btn.wah-btn  { border-color: var(–purple); color: var(–purple); }
.oto-btn.wah-btn.active  { background: var(–purple); color: #fff; box-shadow: 0 0 16px var(–purple); }

/* Center: joy + bass slider */
.oto-center {
display: flex;
flex-direction: column;
align-items: center;
gap: 6px;
}

#oto-joy-container {
border-radius: 50%;
background: #111;
border: 2px solid #444;
position: relative;
touch-action: none;
cursor: crosshair;
flex-shrink: 0;
}

#oto-stick {
border-radius: 50%;
background: var(–neon);
position: absolute;
box-shadow: 0 0 15px var(–neon), 0 0 30px var(–neon);
transition: box-shadow 0.1s;
pointer-events: none;
}

.oto-label {
font-size: 0.55rem;
letter-spacing: 0.15em;
color: var(–muted);
text-transform: uppercase;
}

.joy-mode-row {
display: flex;
border: 1px solid #333;
border-radius: 16px;
overflow: hidden;
}
.joy-mode-btn {
padding: 3px 9px;
border: none;
background: transparent;
color: #555;
font-family: ‘Share Tech Mono’, monospace;
font-size: 0.5rem;
font-weight: bold;
cursor: pointer;
letter-spacing: 0.1em;
transition: all 0.12s;
}
.joy-mode-btn.active { background: var(–purple); color: white; }

/* Bass slider */
.bass-col {
display: flex;
flex-direction: column;
align-items: center;
gap: 3px;
}
.bass-label { font-size: 0.5rem; color: var(–muted); letter-spacing: 0.1em; }
input[type=range].vert {
writing-mode: bt-lr;
-webkit-appearance: slider-vertical;
appearance: slider-vertical;
width: 28px; height: 90px;
margin: 0; touch-action: none; cursor: pointer;
}
input[type=range].vert::-webkit-slider-thumb {
-webkit-appearance: none;
width: 22px; height: 22px;
border-radius: 50%;
background: var(–neon);
box-shadow: 0 0 8px var(–neon);
cursor: pointer;
}

/* ── RIGHT LOOPER ── */
#oto-looper {
flex-shrink: 0;
padding: 4px 8px 6px;
border-top: 1px solid var(–border);
background: var(–bg);
}

/* ── START OVERLAY ── */
#start-overlay {
position: fixed; inset: 0;
background: rgba(8,8,16,0.96);
z-index: 999;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 14px;
}
.start-title {
font-family: ‘Bebas Neue’, cursive;
font-size: 2.8rem;
letter-spacing: 0.3em;
color: var(–neon);
text-shadow: 0 0 30px rgba(0,242,255,0.6);
}
.start-sub {
font-size: 0.65rem;
color: var(–muted);
letter-spacing: 0.2em;
text-transform: uppercase;
}
.start-btn {
padding: 14px 40px;
border-radius: 50px;
background: var(–neon);
border: none;
color: #000;
font-family: ‘Bebas Neue’, cursive;
font-size: 1.2rem;
letter-spacing: 0.2em;
cursor: pointer;
box-shadow: 0 0 30px rgba(0,242,255,0.4);
transition: box-shadow 0.2s;
}
.start-btn:active { box-shadow: 0 0 50px rgba(0,242,255,0.8); }

/* ── DRAG GHOST ── */
#drag-ghost {
position: fixed;
pointer-events: none;
z-index: 9999;
width: 44px; height: 44px;
border-radius: 8px;
display: flex; align-items: center; justify-content: center;
font-size: 0.6rem;
border: 1px solid white;
background: rgba(0,0,0,0.8);
color: white;
opacity: 0;
transform: translate(-50%, -50%);
letter-spacing: 0.05em;
text-align: center;
}

/* ── WAVEFORM EDITOR MODAL ── */
.editor-modal {
display: none; position: fixed; inset: 0;
background: #060608; z-index: 500;
flex-direction: column; align-items: center;
padding: 12px 14px 10px; gap: 0; overflow-y: auto;
}
.editor-modal.open { display: flex; }
.ed-title { font-size: 0.65rem; letter-spacing: 0.2em; color: var(–purple); text-transform: uppercase; margin-bottom: 8px; align-self: flex-start; }
.ed-orig-label, .ed-work-label { font-size: 0.5rem; color: #444; letter-spacing: 0.1em; text-transform: uppercase; align-self: flex-start; margin-bottom: 2px; }
.ed-canvas-wrap { width: 100%; position: relative; background: #0a0a14; border: 1px solid #1e1e2e; border-radius: 6px; overflow: visible; touch-action: none; flex-shrink: 0; }
.ed-canvas-wrap.orig { opacity: 0.4; pointer-events: none; margin-bottom: 4px; height: 55px; }
.ed-canvas-wrap.work { height: 55px; margin-bottom: 4px; }
#edWaveCanvas { display: block; width: 100%; height: 55px; border-radius: 6px; position: absolute; top: 0; left: 0; }
#edPlayhead { position: absolute; top:0;bottom:0; width: 2px; background: white; box-shadow: 0 0 6px white; pointer-events: none; z-index: 5; left: 0%; transform: translateX(-50%); border-radius: 1px; }
.trim-shade { position: absolute; top:0; height:100%; background: rgba(0,0,0,0.7); pointer-events: none; z-index:1; border-radius:6px; }
.trim-handle { position: absolute; top:-6px; height:calc(100% + 12px); width:5px; background: var(–purple); cursor: ew-resize; touch-action: none; box-shadow: 0 0 10px var(–purple); z-index:10; }
.trim-handle::before { content:’’; position:absolute; top:50%;left:50%; transform:translate(-50%,-50%); width:34px;height:46px; background:var(–purple); border-radius:8px; opacity:0.85; }
.trim-handle::after { content:‘⋮’; position:absolute;top:50%;left:50%;transform:translate(-50%,-50%); color:white;font-size:14px;z-index:11;pointer-events:none; }
.ed-ruler-wrap { width:100%; height:20px; position:relative; flex-shrink:0; margin:3px 0; }
#edRuler { display:block;width:100%;height:20px; }
.ed-time-row { display:flex;justify-content:space-between;align-items:center;width:100%;margin:4px 0; }
.ed-time-box { text-align:center; }
.ed-time-big { font-size:1.1rem;font-weight:bold;color:var(–purple);font-family:‘Share Tech Mono’,monospace; }
.ed-time-lbl { font-size:0.45rem;color:#444;letter-spacing:0.1em;text-transform:uppercase; }
.ed-dur-big { font-size:1.4rem;font-weight:bold;color:var(–neon);font-family:‘Share Tech Mono’,monospace; }
.nudge-btn { width:30px;height:30px;border-radius:50%;border:2px solid var(–neon);color:var(–neon);background:transparent;font-size:18px;line-height:1;font-family:‘Share Tech Mono’,monospace;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:none;transition:all 0.1s;user-select:none; }
.nudge-btn:active { background:var(–neon);color:#000; }
.ed-undo-row { display:flex;gap:6px;width:100%;margin-bottom:5px; }
.ed-undo-btn { flex:1;padding:8px 3px;border-radius:6px;border:1px solid #333;font-family:‘Share Tech Mono’,monospace;font-size:0.52rem;cursor:pointer;background:transparent;color:#555;letter-spacing:0.08em;transition:all 0.12s; }
.ed-undo-btn:not(:disabled):active { background:#222;color:white; }
.ed-undo-btn:disabled { opacity:0.25;cursor:default; }
.ed-undo-btn.active-u { border-color:#888;color:#aaa; }
.ed-btns { display:flex;gap:6px;width:100%; }
.ed-btn { flex:1;padding:11px 4px;border-radius:6px;border:2px solid;font-family:‘Share Tech Mono’,monospace;font-size:0.6rem;font-weight:bold;cursor:pointer;background:transparent;letter-spacing:0.08em;transition:all 0.12s; }
.ed-btn.keep { border-color:var(–neon);color:var(–neon); }
.ed-btn.keep:active { background:var(–neon);color:#000; }
.ed-btn.close-ed { border-color:#333;color:#555; }
.ed-btn.close-ed:active { background:#222;color:white; }

/* ── COG MODAL ── */
.modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:600;align-items:center;justify-content:center; }
.modal-overlay.open { display:flex; }
.modal-box { background:#12121a;border:1px solid var(–purple);border-radius:14px;padding:20px;width:85vw;max-width:320px;box-shadow:0 0 40px rgba(139,92,246,0.25); }
.modal-title { font-size:0.75rem;letter-spacing:0.18em;color:var(–purple);text-transform:uppercase;margin-bottom:16px;text-align:center; }
.save-ch-btn { width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#1a1a2e;color:#888;font-family:‘Share Tech Mono’,monospace;font-size:0.6rem;cursor:pointer;text-align:left;transition:all 0.15s;margin-bottom:6px; }
.save-ch-btn.has-rec { border-color:var(–purple);color:white; }
.save-ch-btn.has-rec:active { background:var(–purple); }
.modal-close { width:100%;padding:9px;background:transparent;border:1px solid #333;color:#555;font-family:‘Share Tech Mono’,monospace;font-size:0.6rem;border-radius:6px;cursor:pointer;letter-spacing:0.08em;margin-top:8px; }
.modal-close:active { background:#222; }

/* responsive vertical for portrait (fallback) */
@media (orientation: portrait) {
#app { flex-direction: column; }
#left-panel { flex: 0 0 55%; border-right: none; border-bottom: 1px solid var(–border); }
}
</style>

</head>
<body>

<!-- START OVERLAY -->

<div id="start-overlay">
  <div class="start-title">DUAL BEAST</div>
  <div class="start-sub">Drum Joystick · Otomatone · Looper</div>
  <button class="start-btn" id="startBtn">TAP TO START</button>
  <div class="start-sub" style="font-size:0.55rem;margin-top:4px;">Best in landscape mode</div>
</div>

<!-- DRAG GHOST -->

<script>
'use strict';
// ═══════════════════════════════════════════
//  AUDIO CONTEXT
// ═══════════════════════════════════════════
let ctx, isInit = false;
let bassOsc, bassFilter, bassGain;
let loopOsc = {}, loopFilter = {}, loopGain = {};

function initAudio() {
  if (isInit) return;
  ctx = new (window.AudioContext || window.webkitAudioContext)();

  bassOsc    = ctx.createOscillator(); bassOsc.type = 'sawtooth';
  bassFilter = ctx.createBiquadFilter();
  bassFilter.type = 'lowpass'; bassFilter.frequency.value = 200; bassFilter.Q.value = 1;
  bassGain   = ctx.createGain(); bassGain.gain.value = 0;
  bassOsc.connect(bassFilter); bassFilter.connect(bassGain); bassGain.connect(ctx.destination);
  bassOsc.start();

  initChannelOsc(1); initChannelOsc(2);
  isInit = true;
  document.getElementById('start-overlay').style.display = 'none';
  sizeJoysticks();
}

function initChannelOsc(ch) {
  if (loopOsc[ch]) return;
  loopOsc[ch]    = ctx.createOscillator(); loopOsc[ch].type = 'sawtooth';
  loopFilter[ch] = ctx.createBiquadFilter();
  loopFilter[ch].type = 'lowpass'; loopFilter[ch].frequency.value = 200; loopFilter[ch].Q.value = 1;
  loopOsc[ch].frequency.value = 100;
  loopGain[ch]   = ctx.createGain(); loopGain[ch].gain.value = 0;
  loopOsc[ch].connect(loopFilter[ch]); loopFilter[ch].connect(loopGain[ch]); loopGain[ch].connect(ctx.destination);
  loopOsc[ch].start();
}

// ═══════════════════════════════════════════
//  DRUMS
// ═══════════════════════════════════════════
const DRUMS = [
  { id:'kick',   label:'KICK',    color:'#ff3860' },
  { id:'snare',  label:'SNARE',   color:'#f59e0b' },
  { id:'hat',    label:'HAT',     color:'#00f2ff' },
  { id:'clap',   label:'CLAP',    color:'#8b5cf6' },
  { id:'tom',    label:'TOM',     color:'#ff6b35' },
  { id:'crash',  label:'CRASH',   color:'#4ecdc4' },
  { id:'rim',    label:'RIM',     color:'#f7b731' },
  { id:'perc',   label:'PERC',    color:'#ec4899' },
];

function drumColor(id) { return (DRUMS.find(d=>d.id===id)||{color:'#fff'}).color; }

function playDrum(id, fromLoop) {
  if (!ctx) return;
  if (!fromLoop) loopCapture({ kind:'drum', type:id });
  flashChip(id);
  const now = ctx.currentTime;
  const g = ctx.createGain();
  g.connect(ctx.destination);

  if (id==='kick') {
    const o=ctx.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(150,now); o.frequency.exponentialRampToValueAtTime(40,now+0.25);
    g.gain.setValueAtTime(1.1,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.35);
    o.connect(g); o.start(now); o.stop(now+0.36); o.onended=()=>g.disconnect();
  } else if (id==='snare') {
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.2,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const s=ctx.createBufferSource(); s.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1000;
    s.connect(f); f.connect(g); g.gain.setValueAtTime(1,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.2);
    s.start(now); s.onended=()=>g.disconnect();
  } else if (id==='hat') {
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.06,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const s=ctx.createBufferSource(); s.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=7000;
    s.connect(f); f.connect(g); g.gain.setValueAtTime(0.35,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.07);
    s.start(now); s.onended=()=>g.disconnect();
  } else if (id==='clap') {
    for(let i=0;i<3;i++){
      const g2=ctx.createGain(); g2.connect(ctx.destination);
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.05,ctx.sampleRate);
      const d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1;
      const s=ctx.createBufferSource(); s.buffer=buf;
      const f=ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1100; f.Q.value=0.8;
      s.connect(f); f.connect(g2);
      const t=now+i*0.014;
      g2.gain.setValueAtTime(0.5,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.06);
      s.start(t); s.onended=()=>g2.disconnect();
    }
  } else if (id==='tom') {
    const o=ctx.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(180,now); o.frequency.exponentialRampToValueAtTime(70,now+0.22);
    g.gain.setValueAtTime(0.9,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.26);
    o.connect(g); o.start(now); o.stop(now+0.27); o.onended=()=>g.disconnect();
  } else if (id==='crash') {
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.8,ctx.sampleRate);
    const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const s=ctx.createBufferSource(); s.buffer=buf;
    const f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=4500;
    s.connect(f); f.connect(g); g.gain.setValueAtTime(0.3,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.75);
    s.start(now); s.onended=()=>g.disconnect();
  } else if (id==='rim') {
    const o=ctx.createOscillator(); o.type='square';
    o.frequency.setValueAtTime(850,now); o.frequency.exponentialRampToValueAtTime(380,now+0.05);
    g.gain.setValueAtTime(0.55,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.06);
    o.connect(g); o.start(now); o.stop(now+0.07); o.onended=()=>g.disconnect();
  } else if (id==='perc') {
    const o=ctx.createOscillator(); o.type='triangle';
    o.frequency.setValueAtTime(550,now); o.frequency.exponentialRampToValueAtTime(180,now+0.13);
    g.gain.setValueAtTime(0.65,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.16);
    o.connect(g); o.start(now); o.stop(now+0.17); o.onended=()=>g.disconnect();
  }
}

function flashChip(id) {
  const el = document.querySelector(`.drum-chip[data-id="${id}"]`);
  if (!el) return;
  el.classList.add('flash');
  setTimeout(()=>el.classList.remove('flash'),130);
}

// ═══════════════════════════════════════════
//  JOYSTICK SIZING
// ═══════════════════════════════════════════
let JOY_R = 120, KNOB_R = 28, JOY_MAX_DIST = 88;
let OTO_R = 80, OTO_KNOB_R = 22, OTO_MAX = 55;

function sizeJoysticks() {
  const joyArea = document.getElementById('joy-area');
  const rect = joyArea.getBoundingClientRect();
  const avail = Math.min(rect.width - 20, rect.height - 60);
  JOY_R = Math.max(80, Math.min(140, avail / 2));
  KNOB_R = Math.round(JOY_R * 0.23);
  JOY_MAX_DIST = JOY_R - KNOB_R - 6;

  const w = document.getElementById('joy-wrapper');
  const diam = JOY_R * 2;
  w.style.width = diam + 'px';
  w.style.height = diam + 'px';

  // rings
  [0.3, 0.6, 0.88].forEach((r, i) => {
    const el = document.getElementById('jr' + (i+1));
    const s = r * diam;
    el.style.width = s + 'px'; el.style.height = s + 'px';
  });

  // knob
  const kn = document.getElementById('joy-knob');
  const ks = KNOB_R * 2;
  kn.style.width = ks + 'px'; kn.style.height = ks + 'px';
  kn.style.left = JOY_R + 'px'; kn.style.top = JOY_R + 'px';

  // oto joy
  const oRect = document.getElementById('oto-body').getBoundingClientRect();
  const oAvail = Math.min(oRect.width * 0.45, oRect.height - 50);
  OTO_R = Math.max(65, Math.min(110, oAvail / 2));
  OTO_KNOB_R = Math.round(OTO_R * 0.28);
  OTO_MAX = OTO_R - OTO_KNOB_R - 5;

  const oc = document.getElementById('oto-joy-container');
  const od = OTO_R * 2;
  oc.style.width = od + 'px'; oc.style.height = od + 'px';

  const sk = document.getElementById('oto-stick');
  const skS = OTO_KNOB_R * 2;
  sk.style.width = skS + 'px'; sk.style.height = skS + 'px';
  sk.style.top = (OTO_R - OTO_KNOB_R) + 'px';
  sk.style.left = (OTO_R - OTO_KNOB_R) + 'px';
}

// ═══════════════════════════════════════════
//  LOCK CIRCLES (drum assignments on joystick)
// ═══════════════════════════════════════════
let locks = [];  // { id, drumId, angle, radius }
let lockIdCtr = 0;

function addLock(drumId, angle, radius) {
  locks.push({ id: 'lk'+(lockIdCtr++), drumId, angle, radius: Math.min(0.95, Math.max(0.35, radius)) });
  renderLocks();
}

function removeLock(id) {
  locks = locks.filter(l=>l.id!==id);
  renderLocks();
}

function renderLocks() {
  const w = document.getElementById('joy-wrapper');
  w.querySelectorAll('.lock-circle').forEach(el=>el.remove());

  locks.forEach(lk => {
    const rad = lk.angle * Math.PI / 180;
    const x = JOY_R + JOY_R * lk.radius * Math.cos(rad);
    const y = JOY_R + JOY_R * lk.radius * Math.sin(rad);
    const color = drumColor(lk.drumId);
    const drum = DRUMS.find(d=>d.id===lk.drumId);

    const el = document.createElement('div');
    el.className = 'lock-circle';
    el.dataset.id = lk.id;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    el.style.borderColor = color;
    el.style.boxShadow = `0 0 8px ${color}88`;
    el.innerHTML = `<span class="lc-label">${drum ? drum.label.substring(0,3) : '?'}</span><span class="lc-del" data-id="${lk.id}">✕</span>`;

    // Delete button
    el.querySelector('.lc-del').addEventListener('pointerdown', e => {
      e.stopPropagation();
      removeLock(lk.id);
    });

    // Drag to reposition
    let dragging = false;
    el.addEventListener('pointerdown', e => {
      if (e.target.classList.contains('lc-del')) return;
      dragging = true;
      el.setPointerCapture(e.pointerId);
      e.stopPropagation();
    });
    el.addEventListener('pointermove', e => {
      if (!dragging) return;
      const rect = w.getBoundingClientRect();
      const dx = e.clientX - rect.left - JOY_R;
      const dy = e.clientY - rect.top  - JOY_R;
      const dist = Math.sqrt(dx*dx+dy*dy);
      lk.angle = (Math.atan2(dy,dx)*180/Math.PI+360)%360;
      lk.radius = Math.min(0.95, Math.max(0.3, dist/JOY_R));
      renderLocks();
    });
    el.addEventListener('pointerup', ()=>{ dragging=false; });

    w.insertBefore(el, document.getElementById('joy-knob'));
  });
}

// ═══════════════════════════════════════════
//  DRUM JOYSTICK LOGIC
// ═══════════════════════════════════════════
let joyActive = false;
let joyNX = 0, joyNY = 0;  // normalized -1..1
let beatIdx = 0;
let repeatTimers = {};  // lkId -> intervalId

function getJoyDist() { return Math.min(1, Math.sqrt(joyNX*joyNX + joyNY*joyNY)); }
function getJoyAngle() { return (Math.atan2(joyNY, joyNX)*180/Math.PI+360)%360; }

function updateDrumJoy(normX, normY) {
  const dist = Math.sqrt(normX*normX+normY*normY);
  const clamped = Math.min(1, dist);
  const f = dist > 0 ? clamped/dist : 0;
  joyNX = normX*f; joyNY = normY*f;

  // Move knob
  const kn = document.getElementById('joy-knob');
  kn.style.left = (JOY_R + joyNX*JOY_MAX_DIST) + 'px';
  kn.style.top  = (JOY_R + joyNY*JOY_MAX_DIST) + 'px';

  // Speed bar
  document.getElementById('speed-fill').style.width = (clamped*100)+'%';

  // BPM display: distance 0→1 maps to 1→6 hits/sec = 60→360 bpm
  const hps = 1 + clamped * 5;  // 1..6 hits/sec
  document.getElementById('bpm-val').textContent = clamped > 0.05 ? Math.round(hps*10)/10 + '/s' : '—';

  // Glow
  const col = clamped < 0.4 ? 'rgba(0,242,255,' : clamped < 0.7 ? 'rgba(245,166,35,' : 'rgba(255,56,96,';
  document.getElementById('joy-glow').style.boxShadow =
    clamped > 0.05 ? `inset 0 0 ${25*clamped}px ${col}0.3)` : 'none';

  // Check lock zones and manage repeating
  checkLockTriggers(clamped);
}

function checkLockTriggers(dist) {
  const angle = getJoyAngle();

  locks.forEach(lk => {
    const angDiff = Math.abs(((lk.angle - angle + 540) % 360) - 180);
    const distDiff = Math.abs(lk.radius - dist);
    const inZone = angDiff < 28 && distDiff < 0.2 && dist > 0.12;

    const el = document.querySelector(`.lock-circle[data-id="${lk.id}"]`);
    if (el) el.classList.toggle('triggered', inZone);

    if (inZone) {
      if (!repeatTimers[lk.id]) {
        // Immediate first hit
        playDrum(lk.drumId);
        pulseBeatDot();
        // Schedule repeating hits based on distance
        const hps = 1 + dist * 5;  // 1..6 hits/sec
        const intervalMs = 1000 / hps;
        repeatTimers[lk.id] = setInterval(() => {
          if (!joyActive) { clearRepeat(lk.id); return; }
          // Re-check still in zone
          const a2 = getJoyAngle(), d2 = getJoyDist();
          const ad2 = Math.abs(((lk.angle - a2 + 540) % 360) - 180);
          const dd2 = Math.abs(lk.radius - d2);
          if (ad2 < 28 && dd2 < 0.2 && d2 > 0.12) {
            playDrum(lk.drumId);
            pulseBeatDot();
            // Update interval dynamically
            const newHps = 1 + d2 * 5;
            const newMs = 1000 / newHps;
            if (Math.abs(newMs - intervalMs) > 50) {
              clearRepeat(lk.id);  // restart with new rate
            }
          } else {
            clearRepeat(lk.id);
          }
        }, intervalMs);
      }
    } else {
      clearRepeat(lk.id);
    }
  });
}

function clearRepeat(id) {
  if (repeatTimers[id]) { clearInterval(repeatTimers[id]); delete repeatTimers[id]; }
  const el = document.querySelector(`.lock-circle[data-id="${id}"]`);
  if (el) el.classList.remove('triggered');
}

function clearAllRepeats() {
  Object.keys(repeatTimers).forEach(id => clearRepeat(id));
}

function pulseBeatDot() {
  const dots = document.querySelectorAll('.beat-dot');
  if (!dots.length) return;
  const prev = document.querySelector('.beat-dot.on');
  if (prev) { prev.classList.remove('on'); prev.classList.add('ghost'); }
  const next = dots[beatIdx % dots.length];
  if (next) { next.classList.add('on'); next.classList.remove('ghost'); }
  beatIdx++;
}

// Joystick event handlers
const jw = document.getElementById('joy-wrapper');

function joyPointerNorm(e) {
  const rect = jw.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left - JOY_R) / JOY_MAX_DIST,
    y: (e.clientY - rect.top  - JOY_R) / JOY_MAX_DIST
  };
}

jw.addEventListener('pointerdown', e => {
  if (e.target.classList.contains('lock-circle') || e.target.classList.contains('lc-del')) return;
  joyActive = true;
  jw.setPointerCapture(e.pointerId);
  const {x,y} = joyPointerNorm(e); updateDrumJoy(x,y);
});
jw.addEventListener('pointermove', e => {
  if (!joyActive) return;
  const {x,y} = joyPointerNorm(e); updateDrumJoy(x,y);
});
jw.addEventListener('pointerup', () => { joyActive=false; snapJoyToCenter(); clearAllRepeats(); });
jw.addEventListener('pointercancel', () => { joyActive=false; snapJoyToCenter(); clearAllRepeats(); });

function snapJoyToCenter() {
  let nx=joyNX, ny=joyNY, i=0;
  function step() {
    nx*=0.65; ny*=0.65;
    updateDrumJoy(nx,ny);
    if (++i<14 && (Math.abs(nx)>0.01||Math.abs(ny)>0.01)) requestAnimationFrame(step);
    else { joyNX=0; joyNY=0; updateDrumJoy(0,0); }
  }
  requestAnimationFrame(step);
}

// ═══════════════════════════════════════════
//  DRAG-AND-DROP: sidebar → joystick
// ═══════════════════════════════════════════
let dragDrum = null;
const ghost = document.getElementById('drag-ghost');

function buildSidebar() {
  const sb = document.getElementById('drum-sidebar');
  // Clear existing chips
  sb.querySelectorAll('.drum-chip').forEach(el=>el.remove());
  DRUMS.forEach(d => {
    const chip = document.createElement('div');
    chip.className = 'drum-chip';
    chip.dataset.id = d.id;
    chip.innerHTML = `<span class="chip-dot" style="background:${d.color}"></span>${d.label}`;

    chip.addEventListener('pointerdown', e => {
      e.stopPropagation();
      chip.setPointerCapture(e.pointerId);
      dragDrum = d.id;
      chip.classList.add('dragging');
      ghost.textContent = d.label;
      ghost.style.borderColor = d.color;
      ghost.style.opacity = '1';
      ghost.style.left = e.clientX + 'px';
      ghost.style.top  = e.clientY + 'px';
      document.getElementById('joy-wrapper').classList.add('drop-active');
    });

    chip.addEventListener('pointermove', e => {
      if (!dragDrum) return;
      ghost.style.left = e.clientX + 'px';
      ghost.style.top  = e.clientY + 'px';
    });

    chip.addEventListener('pointerup', e => {
      if (!dragDrum) return;
      // Check if dropped on joystick
      const jwRect = document.getElementById('joy-wrapper').getBoundingClientRect();
      const dx = e.clientX - (jwRect.left + JOY_R);
      const dy = e.clientY - (jwRect.top  + JOY_R);
      const dist = Math.sqrt(dx*dx+dy*dy);

      if (dist <= JOY_R * 0.95 && dist > JOY_R * 0.2) {
        // Place lock circle at drop position
        const angle = (Math.atan2(dy,dx)*180/Math.PI+360)%360;
        const radius = Math.min(0.93, dist/JOY_R);
        addLock(dragDrum, angle, radius);
        // Quick play preview
        if (isInit) playDrum(dragDrum);
      }

      // Cleanup
      dragDrum = null;
      chip.classList.remove('dragging');
      ghost.style.opacity = '0';
      document.getElementById('joy-wrapper').classList.remove('drop-active');
    });

    chip.addEventListener('pointercancel', () => {
      dragDrum = null;
      chip.classList.remove('dragging');
      ghost.style.opacity = '0';
      document.getElementById('joy-wrapper').classList.remove('drop-active');
    });

    // Tap to play directly
    chip.addEventListener('click', () => { if (isInit) playDrum(d.id); });

    sb.appendChild(chip);
  });
}

function hsvToHex(h,s,v) {
  h=h%360; const c=v*s,x=c*(1-Math.abs((h/60)%2-1)),m=v-c;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}
  const hex=n=>Math.round((n+m)*255).toString(16).padStart(2,'0');
  return `#${hex(r)}${hex(g)}${hex(b)}`;
}

function updateOtoColor(x,y) {
  const color = hsvToHex((x+1)/2*360, 1.0, 0.5+(1-(y+1)/2)*0.5);
  const sk = document.getElementById('oto-stick');
  sk.style.background = color;
  sk.style.boxShadow = `0 0 14px ${color}, 0 0 28px ${color}`;
}

function handleOtoMove(clientX, clientY) {
  const joy = document.getElementById('oto-joy-container');
  const rect = joy.getBoundingClientRect();
  let x = (clientX-rect.left-OTO_R)/OTO_R;
  let y = (clientY-rect.top -OTO_R)/OTO_R;
  x = Math.max(-1,Math.min(1,x));
  y = Math.max(-1,Math.min(1,y));
  const sk = document.getElementById('oto-stick');
  sk.style.transform = `translate(${x*OTO_MAX}px,${y*OTO_MAX}px)`;
  updateOtoColor(x,y);
  if (isInit) {
    const freq = 40+(x+1)*60;
    const filterF = 200+(1-y)*2000;
    const vol = parseFloat(document.getElementById('bass_vol').value);
    bassOsc.frequency.setTargetAtTime(freq, ctx.currentTime, 0.05);
    bassFilter.frequency.setTargetAtTime(filterF, ctx.currentTime, 0.05);
    bassGain.gain.setTargetAtTime(vol, ctx.currentTime, 0.05);
    otoLoopCapture({ kind:'oto', x, y, vol });
  }
}

function handleOtoEnd() {
  if (joyMode === 'snap') {
    const sk = document.getElementById('oto-stick');
    sk.style.transform = 'translate(0,0)';
    sk.style.background = 'var(--neon)';
    sk.style.boxShadow = '0 0 15px var(--neon), 0 0 30px var(--neon)';
    if (isInit) { bassGain.gain.setTargetAtTime(0, ctx.currentTime, 0.1); otoLoopCapture({ kind:'oto_end' }); }
  }
}

const CH_COLORS = ['#ff3860','#00f2ff','#8b5cf6','#f59e0b','#10b981','#ec4899'];
function chColor(ch){ return CH_COLORS[(ch-1)%CH_COLORS.length]; }

const drumLooper = {};
let drumNextCh = 1;

function makeLp() { return { state:'idle', events:[], buffer:null, timers:[], rafId:null, loopTimeout:null, timerInterval:null, recStart:0 }; }
function createDrumCh(){ const ch=drumNextCh++; drumLooper[ch]=makeLp(); if(isInit)initChannelOsc(ch); renderDrumLooper(); return ch; }

function drumLoopCapture(ev) {  // renamed below
  Object.keys(drumLooper).forEach(ch=>{ ch=Number(ch); const lp=drumLooper[ch]; if(lp.state==='recording') lp.events.push({...ev,t:performance.now()-lp.recStart}); });
}
function loopCapture(ev){ drumLoopCapture(ev); }  // alias for playDrum calls

function drumRec(ch){ if(!isInit)return; const lp=drumLooper[ch]; if(lp.state==='playing')drumStop(ch); lp.events=[]; lp.state='recording'; lp.recStart=performance.now(); lp.timerInterval=setInterval(()=>{ const s=Math.floor((performance.now()-lp.recStart)/1000); const el=document.getElementById(`dch${ch}-timer`); if(el) el.textContent=`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; },500); renderDrumLooper(); }

function drumStopRec(ch){ const lp=drumLooper[ch]; if(lp.state!=='recording'){drumStop(ch);return;} clearInterval(lp.timerInterval); const lenMs=performance.now()-lp.recStart; lp.buffer={events:[...lp.events],lengthMs:lenMs,trimStart:0,trimEnd:lenMs}; lp.state='recorded'; renderDrumLooper(); openEditor(ch,'drum'); }

function drumPlay(ch){ if(!isInit)return; const lp=drumLooper[ch]; if(!lp.buffer)return; if(lp.state==='playing'){drumStop(ch);return;} lp.state='playing'; renderDrumLooper(); scheduleDrumLoop(ch); }

function scheduleDrumLoop(ch){ const lp=drumLooper[ch]; if(lp.state!=='playing')return; const {events,trimStart,trimEnd}=lp.buffer; const lenMs=trimEnd-trimStart; events.filter(ev=>ev.t>=trimStart&&ev.t<=trimEnd).forEach(ev=>{ lp.timers.push(setTimeout(()=>{ if(lp.state!=='playing')return; if(ev.kind==='drum') playDrum(ev.type,true); },ev.t-trimStart)); }); lp.loopTimeout=setTimeout(()=>{ if(lp.state==='playing') scheduleDrumLoop(ch); },lenMs); animateLoopBar('d',ch,lenMs); }

function drumStop(ch){ const lp=drumLooper[ch]; clearInterval(lp.timerInterval); cancelAnimationFrame(lp.rafId); clearTimeout(lp.loopTimeout); lp.timers.forEach(t=>clearTimeout(t)); lp.timers=[]; lp.state=lp.buffer?'recorded':'idle'; renderDrumLooper(); resetBar('d',ch); }

function drumDelete(ch){ drumStop(ch); drumLooper[ch]=makeLp(); renderDrumLooper(); }

function renderDrumLooper(){
  const c=document.getElementById('looper-channels'); c.innerHTML='';
  Object.keys(drumLooper).map(Number).sort((a,b)=>a-b).forEach(ch=>{
    const color=chColor(ch); const lp=drumLooper[ch];
    const d=document.createElement('div'); d.className='looper-channel-row'; d.style.borderColor=color+'33';
    d.innerHTML=`<span class="ch-lbl" style="color:${color}">D${ch}</span><div class="ch-btns"><button class="lp-btn rec${lp.state==='recording'?' active':''}" id="dch${ch}-rec" onclick="drumRec(${ch})">REC</button><button class="lp-btn stop" onclick="drumStopRec(${ch})">STOP</button><button class="lp-btn play${lp.state==='playing'?' active':''}" onclick="drumPlay(${ch})">PLAY</button>${lp.buffer?`<button class="lp-btn edit" onclick="openEditor(${ch},'drum')">✂</button><button class="lp-btn del" onclick="drumDelete(${ch})">✕</button>`:''}</div><span id="dch${ch}-timer" style="font-size:0.5rem;color:#555;min-width:22px;text-align:right;">0:00</span>`;
    c.appendChild(d);
    const prog=document.createElement('div'); prog.className='ch-progress';
    prog.innerHTML=`<div class="ch-progress-bar" id="dch${ch}-bar" style="background:${color}"></div><div class="ch-playhead" id="dch${ch}-head" style="background:${color};box-shadow:0 0 6px ${color}"></div>`;
    c.appendChild(prog);
  });
  const lastCh=Object.keys(drumLooper).map(Number).sort((a,b)=>a-b).slice(-1)[0];
  if(drumLooper[lastCh]&&drumLooper[lastCh].buffer){ const b=document.createElement('button'); b.className='add-ch-btn'; b.textContent='+ ADD CHANNEL'; b.onclick=()=>createDrumCh(); c.appendChild(b); }
}

const otoLooper = {};
let otoNextCh = 1;

function makeLpO() { return { state:'idle', events:[], buffer:null, timers:[], rafId:null, loopTimeout:null, timerInterval:null, recStart:0 }; }
function createOtoCh(){ const ch=otoNextCh++; otoLooper[ch]=makeLpO(); if(isInit)initChannelOsc(ch+10); renderOtoLooper(); return ch; }

function otoLoopCapture(ev){ Object.keys(otoLooper).forEach(ch=>{ ch=Number(ch); const lp=otoLooper[ch]; if(lp.state==='recording') lp.events.push({...ev,t:performance.now()-lp.recStart}); }); }

function otoRec(ch){ if(!isInit)return; const lp=otoLooper[ch]; if(lp.state==='playing')otoStop(ch); lp.events=[]; lp.state='recording'; lp.recStart=performance.now(); lp.timerInterval=setInterval(()=>{ const s=Math.floor((performance.now()-lp.recStart)/1000); const el=document.getElementById(`och${ch}-timer`); if(el) el.textContent=`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; },500); renderOtoLooper(); }

function otoStopRec(ch){ const lp=otoLooper[ch]; if(lp.state!=='recording'){otoStop(ch);return;} clearInterval(lp.timerInterval); const lenMs=performance.now()-lp.recStart; lp.buffer={events:[...lp.events],lengthMs:lenMs,trimStart:0,trimEnd:lenMs}; lp.state='recorded'; renderOtoLooper(); openEditor(ch,'oto'); }

function otoPlay(ch){ if(!isInit)return; const lp=otoLooper[ch]; if(!lp.buffer)return; if(lp.state==='playing'){otoStop(ch);return;} lp.state='playing'; renderOtoLooper(); scheduleOtoLoop(ch); }

function scheduleOtoLoop(ch){ const lp=otoLooper[ch]; if(lp.state!=='playing')return; const osCh=ch+10; if(!loopOsc[osCh]) initChannelOsc(osCh); const {events,trimStart,trimEnd}=lp.buffer; const lenMs=trimEnd-trimStart; events.filter(ev=>ev.t>=trimStart&&ev.t<=trimEnd).forEach(ev=>{ lp.timers.push(setTimeout(()=>{ if(lp.state!=='playing'||!isInit)return; if(ev.kind==='oto'){ loopOsc[osCh].frequency.setTargetAtTime(40+(ev.x+1)*60,ctx.currentTime,0.05); loopFilter[osCh].frequency.setTargetAtTime(200+(1-ev.y)*2000,ctx.currentTime,0.05); loopGain[osCh].gain.setTargetAtTime(ev.vol,ctx.currentTime,0.05); }else if(ev.kind==='oto_end'||ev.kind==='oto_mute'){ loopGain[osCh].gain.setTargetAtTime(0,ctx.currentTime,0.08); }else if(ev.kind==='oto_unmute'){ loopGain[osCh].gain.setTargetAtTime(ev.vol,ctx.currentTime,0.05); } },ev.t-trimStart)); }); lp.loopTimeout=setTimeout(()=>{ if(lp.state==='playing') scheduleOtoLoop(ch); },lenMs); animateLoopBar('o',ch,lenMs); }

function otoStop(ch){ const osCh=ch+10; const lp=otoLooper[ch]; clearInterval(lp.timerInterval); cancelAnimationFrame(lp.rafId); clearTimeout(lp.loopTimeout); lp.timers.forEach(t=>clearTimeout(t)); lp.timers=[]; if(isInit&&loopGain[osCh]) loopGain[osCh].gain.setTargetAtTime(0,ctx.currentTime,0.05); lp.state=lp.buffer?'recorded':'idle'; renderOtoLooper(); resetBar('o',ch); }

function otoDelete(ch){ otoStop(ch); otoLooper[ch]=makeLpO(); renderOtoLooper(); }

  const c=document.getElementById('oto-looper-channels'); c.innerHTML='';
  Object.keys(otoLooper).map(Number).sort((a,b)=>a-b).forEach(ch=>{

// ── Progress bar helpers ──
function animateLoopBar(prefix, ch, lenMs){
  const pfx = prefix==='d'?'dch':'och';
  const lp = prefix==='d'?drumLooper[ch]:otoLooper[ch];
  const bar=document.getElementById(`${pfx}${ch}-bar`);
  const head=document.getElementById(`${pfx}${ch}-head`);
  cancelAnimationFrame(lp.rafId);
  const start=performance.now();
  function tick(now){ const pct=Math.min(((now-start)/lenMs)*100,100); if(bar)bar.style.width=pct+'%'; if(head)head.style.left=pct+'%'; if(pct<100&&lp.state==='playing') lp.rafId=requestAnimationFrame(tick); }
  lp.rafId=requestAnimationFrame(tick);
}

function resetBar(prefix,ch){
  const pfx=prefix==='d'?'dch':'och';
  const bar=document.getElementById(`${pfx}${ch}-bar`);
  const head=document.getElementById(`${pfx}${ch}-head`);
  if(bar)bar.style.width='0%'; if(head)head.style.left='0%';
}

function openEditor(ch, type) {
  const lp = type==='drum' ? drumLooper[ch] : otoLooper[ch];
  if (!lp||!lp.buffer) return;
  if (lp.state==='playing') type==='drum'?drumStop(ch):otoStop(ch);
  edCh=ch; edType=type;
  edTrimL=lp.buffer.trimStart/lp.buffer.lengthMs;
  edTrimR=lp.buffer.trimEnd/lp.buffer.lengthMs;
  edUndoStack=[]; edRedoStack=[]; updateEdUndoBtns();
  const key=type+ch;
  if(!edOrigSnaps[key]) edOrigSnaps[key]=snapLp(lp);
  document.getElementById('editorModal').classList.add('open');
  setTimeout(()=>{ drawEdOrig(); drawEdWave(); drawEdRuler(); updateEdTrimUI(); startEdLoop(); },60);
}

function closeEditor(){
  stopEdLoop();
  document.getElementById('editorModal').classList.remove('open');
  edCh=null; edType=null;
}

function snapLp(lp){ return { events:JSON.parse(JSON.stringify(lp.buffer.events)), lengthMs:lp.buffer.lengthMs, trimStart:lp.buffer.trimStart, trimEnd:lp.buffer.trimEnd }; }

function restoreSnap(snap,ch,type){
  const lp=type==='drum'?drumLooper[ch]:otoLooper[ch];
  lp.buffer.events=JSON.parse(JSON.stringify(snap.events));
  lp.buffer.lengthMs=snap.lengthMs; lp.buffer.trimStart=snap.trimStart; lp.buffer.trimEnd=snap.trimEnd;
  edTrimL=snap.trimStart/snap.lengthMs; edTrimR=snap.trimEnd/snap.lengthMs;
}

function edUndo(){ if(!edUndoStack.length)return; const lp=edType==='drum'?drumLooper[edCh]:otoLooper[edCh]; edRedoStack.push(snapLp(lp)); restoreSnap(edUndoStack.pop(),edCh,edType); updateEdUndoBtns(); drawEdWave(); drawEdRuler(); updateEdTrimUI(); restartEdLoop(); }
function edRedo(){ if(!edRedoStack.length)return; const lp=edType==='drum'?drumLooper[edCh]:otoLooper[edCh]; edUndoStack.push(snapLp(lp)); restoreSnap(edRedoStack.pop(),edCh,edType); updateEdUndoBtns(); drawEdWave(); drawEdRuler(); updateEdTrimUI(); restartEdLoop(); }
function edResetOrig(){ const snap=edOrigSnaps[edType+edCh]; if(!snap)return; const lp=edType==='drum'?drumLooper[edCh]:otoLooper[edCh]; edUndoStack.push(snapLp(lp)); restoreSnap(snap,edCh,edType); updateEdUndoBtns(); drawEdWave(); drawEdRuler(); updateEdTrimUI(); restartEdLoop(); }
function updateEdUndoBtns(){ document.getElementById('edUndoBtn').disabled=edUndoStack.length===0; document.getElementById('edRedoBtn').disabled=edRedoStack.length===0; document.getElementById('edUndoBtn').classList.toggle('active-u',edUndoStack.length>0); document.getElementById('edRedoBtn').classList.toggle('active-u',edRedoStack.length>0); }

function drawEdOrig(){
  const snap=edOrigSnaps[edType+edCh]; if(!snap)return;
  const canvas=document.getElementById('edOrigCanvas');
  const wrap=document.getElementById('edOrigWrap');
  canvas.width=wrap.clientWidth; canvas.height=55;
  drawEventsToCanvas(canvas, snap.events, snap.lengthMs, edType);
}

function drawEdWave(){
  const lp=edType==='drum'?drumLooper[edCh]:otoLooper[edCh]; if(!lp||!lp.buffer)return;
  const canvas=document.getElementById('edWaveCanvas');
  const wrap=document.getElementById('edWorkWrap');
  canvas.width=wrap.clientWidth; canvas.height=55;
  drawEventsToCanvas(canvas, lp.buffer.events, lp.buffer.lengthMs, edType);
  updateEdTrimUI();
}

function drawEventsToCanvas(canvas, events, lengthMs, type){
  const W=canvas.width, H=canvas.height;
  const cx=canvas.getContext('2d');
  cx.clearRect(0,0,W,H);
  cx.fillStyle='#0a0a14'; cx.fillRect(0,0,W,H);
  // grid
  cx.strokeStyle='rgba(255,255,255,0.04)'; cx.lineWidth=1;
  for(let i=0;i<=16;i++){ const x=(i/16)*W; cx.beginPath(); cx.moveTo(x,0); cx.lineTo(x,H); cx.stroke(); }

  if (type==='drum') {
    const drumCols={kick:'#ff3860',snare:'#f59e0b',hat:'#00f2ff',clap:'#8b5cf6',tom:'#ff6b35',crash:'#4ecdc4',rim:'#f7b731',perc:'#ec4899'};
    const drumIds=Object.keys(drumCols);
    const rowH=H/drumIds.length;
    events.filter(ev=>ev.kind==='drum').forEach(ev=>{
      const x=(ev.t/lengthMs)*W;
      const row=drumIds.indexOf(ev.type); if(row<0)return;
      const col=drumCols[ev.type]||'#fff';
      cx.strokeStyle=col; cx.shadowColor=col; cx.shadowBlur=4; cx.lineWidth=2.5;
      cx.beginPath(); cx.moveTo(x,row*rowH+2); cx.lineTo(x,(row+1)*rowH-2); cx.stroke();
      cx.shadowBlur=0;
    });
  } else {
    // Oto path
    const otoEvs=events.filter(ev=>ev.kind==='oto'||ev.kind==='oto_end').sort((a,b)=>a.t-b.t);
    const grad=cx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#00f2ff'); grad.addColorStop(1,'#8b5cf6');
    cx.strokeStyle=grad; cx.lineWidth=2; cx.shadowColor='#00f2ff'; cx.shadowBlur=5;
    cx.beginPath(); let inPath=false;
    otoEvs.forEach(ev=>{
      const x=(ev.t/lengthMs)*W;
      if(ev.kind==='oto'){ const y=H-(((ev.x+1)/2)*H*0.85)-H*0.07; if(!inPath){cx.moveTo(x,y);inPath=true;}else cx.lineTo(x,y); }
      else inPath=false;
    });
    cx.stroke(); cx.shadowBlur=0;
  }
}

function drawEdRuler(){
  const lp=edType==='drum'?drumLooper[edCh]:otoLooper[edCh]; if(!lp||!lp.buffer)return;
  const canvas=document.getElementById('edRuler');
  const wrap=document.getElementById('editorModal');
  canvas.width=wrap.clientWidth-28; canvas.height=20;
  const W=canvas.width,H=20; const cx=canvas.getContext('2d'); cx.clearRect(0,0,W,H);
  const dur=lp.buffer.lengthMs/1000;
  const intervals=[0.1,0.25,0.5,1,2,5,10];
  const interval=intervals.find(i=>dur/i<=10)||10;
  cx.fillStyle='#333'; cx.font='8px Share Tech Mono'; cx.textAlign='center';
  for(let t=0;t<=dur;t+=interval){ const x=(t/dur)*W; cx.fillStyle='#444'; cx.fillRect(x,0,1,H*0.5); cx.fillStyle='#555'; cx.fillText(t.toFixed(t<1?1:0)+'s',x,H-2); }
}

function updateEdTrimUI(){
  const lp=edType==='drum'?drumLooper[edCh]:otoLooper[edCh]; if(!lp||!lp.buffer)return;
  const dur=lp.buffer.lengthMs/1000;
  const wrap=document.getElementById('edWorkWrap'); const W=wrap.clientWidth||300;
  const lPx=edTrimL*W, rPx=edTrimR*W;
  document.getElementById('edHandleL').style.left=lPx+'px';
  document.getElementById('edHandleR').style.left=(rPx-5)+'px';
  document.getElementById('edShadeL').style.width=lPx+'px';
  document.getElementById('edShadeR').style.left=rPx+'px'; document.getElementById('edShadeR').style.width=(W-rPx)+'px';
  document.getElementById('edStartLbl').textContent=(edTrimL*dur).toFixed(2);
  document.getElementById('edEndLbl').textContent=(edTrimR*dur).toFixed(2);
  document.getElementById('edDurLbl').textContent=((edTrimR-edTrimL)*dur).toFixed(2);
}

function startEdLoop(){ stopEdLoop(); scheduleEdLoop(); }
function restartEdLoop(){ stopEdLoop(); scheduleEdLoop(); }
function scheduleEdLoop(){
  const ch=edCh,type=edType; if(!ch||!type)return;
  const lp=type==='drum'?drumLooper[ch]:otoLooper[ch]; if(!lp||!lp.buffer)return;
  const durMs=lp.buffer.lengthMs, startMs=edTrimL*durMs, endMs=edTrimR*durMs;
  const lenMs=Math.max(200,endMs-startMs);
  // Playhead
  const hStart=performance.now();
  function tickHead(ts){ if(edCh!==ch||edType!==type)return; const pct=Math.min((ts-hStart)/lenMs,1); const ph=document.getElementById('edPlayhead'); if(ph)ph.style.left=(edTrimL*100+pct*(edTrimR-edTrimL)*100)+'%'; if(pct<1) edRaf=requestAnimationFrame(tickHead); }
  edRaf=requestAnimationFrame(tickHead);
  // Events
  lp.buffer.events.forEach(ev=>{
    if(ev.t<startMs||ev.t>=endMs)return;
    const tid=setTimeout(()=>{
      if(edCh!==ch||edType!==type)return;
      if(ev.kind==='drum') playDrum(ev.type,true);
      else if(ev.kind==='oto'&&isInit){ const osCh=ch+10; loopOsc[osCh].frequency.setTargetAtTime(40+(ev.x+1)*60,ctx.currentTime,0.05); loopFilter[osCh].frequency.setTargetAtTime(200+(1-ev.y)*2000,ctx.currentTime,0.05); loopGain[osCh].gain.setTargetAtTime(ev.vol,ctx.currentTime,0.05); }
      else if((ev.kind==='oto_end'||ev.kind==='oto_mute')&&isInit){ const osCh=ch+10; if(loopGain[osCh]) loopGain[osCh].gain.setTargetAtTime(0,ctx.currentTime,0.08); }
    },ev.t-startMs);
    edDrumTimers.push(tid);
  });
  edLoopTimer=setTimeout(()=>{ if(edCh===ch&&edType===type){stopEdLoop();scheduleEdLoop();} },lenMs);
}
function stopEdLoop(){ clearTimeout(edLoopTimer); edDrumTimers.forEach(t=>clearTimeout(t)); edDrumTimers=[]; cancelAnimationFrame(edRaf); edRaf=null; if(edCh&&edType==='oto'&&isInit){ const osCh=edCh+10; if(loopGain[osCh]) loopGain[osCh].gain.setTargetAtTime(0,ctx.currentTime,0.05); } }

// Nudge
let nudgeIv=null;
function startNudge(side,dir,e){ e.preventDefault(); applyNudge(side,dir); nudgeIv=setInterval(()=>applyNudge(side,dir),110); }
function stopNudge(e){ if(e)e.preventDefault(); clearInterval(nudgeIv); nudgeIv=null; }
function applyNudge(side,dir){
  const lp=edType==='drum'?drumLooper[edCh]:otoLooper[edCh]; if(!lp||!lp.buffer)return;
  const step=0.01/lp.buffer.lengthMs*1000;
  if(side==='l') edTrimL=Math.max(edTrimL-(dir==='+'?-step:step),0);
  else edTrimR=Math.min(edTrimR+(dir==='+'?step:-step),1);
  updateEdTrimUI(); clearTimeout(edDragTimer); edDragTimer=setTimeout(()=>restartEdLoop(),250);
}

// Drag handles
function getEdPct(e){ const wrap=document.getElementById('edWorkWrap'); const rect=wrap.getBoundingClientRect(); const cx=e.touches?e.touches[0].clientX:e.clientX; return Math.max(0,Math.min(1,(cx-rect.left)/rect.width)); }
document.getElementById('edHandleL').addEventListener('touchstart',e=>{e.preventDefault();edDragging='l';},{passive:false});
document.getElementById('edHandleL').addEventListener('mousedown',()=>edDragging='l');
document.getElementById('edHandleR').addEventListener('touchstart',e=>{e.preventDefault();edDragging='r';},{passive:false});
document.getElementById('edHandleR').addEventListener('mousedown',()=>edDragging='r');
window.addEventListener('touchmove',e=>{ if(!edDragging)return; e.preventDefault(); const p=getEdPct(e); if(edDragging==='l')edTrimL=Math.min(p,edTrimR-0.02);else edTrimR=Math.max(p,edTrimL+0.02); updateEdTrimUI(); clearTimeout(edDragTimer); edDragTimer=setTimeout(()=>restartEdLoop(),280); },{passive:false});
window.addEventListener('mousemove',e=>{ if(!edDragging)return; const p=getEdPct(e); if(edDragging==='l')edTrimL=Math.min(p,edTrimR-0.02);else edTrimR=Math.max(p,edTrimL+0.02); updateEdTrimUI(); clearTimeout(edDragTimer); edDragTimer=setTimeout(()=>restartEdLoop(),280); });
window.addEventListener('touchend',()=>edDragging=null);
window.addEventListener('mouseup',()=>edDragging=null);

async function edKeepTrim(){
  const lp=edType==='drum'?drumLooper[edCh]:otoLooper[edCh]; if(!lp||!lp.buffer)return;
  edUndoStack.push(snapLp(lp));
  const durMs=lp.buffer.lengthMs, startMs=edTrimL*durMs, endMs=edTrimR*durMs, newLen=endMs-startMs;
  lp.buffer.events=lp.buffer.events.filter(ev=>ev.t>=startMs&&ev.t<endMs).map(ev=>({...ev,t:ev.t-startMs}));
  lp.buffer.lengthMs=newLen; lp.buffer.trimStart=0; lp.buffer.trimEnd=newLen;
  edTrimL=0; edTrimR=1; updateEdUndoBtns(); await drawEdWave(); drawEdRuler(); updateEdTrimUI(); restartEdLoop();
}

function openCog(){ const list=document.getElementById('cog-save-list'); list.innerHTML=''; const allChs=[...Object.keys(drumLooper).map(ch=>({ch:Number(ch),type:'drum',lp:drumLooper[ch]})),...Object.keys(otoLooper).map(ch=>({ch:Number(ch),type:'oto',lp:otoLooper[ch]}))]; allChs.forEach(({ch,type,lp})=>{ const color=type==='drum'?chColor(ch):chColor(ch+2); const btn=document.createElement('button'); btn.className='save-ch-btn'+(lp.buffer?' has-rec':''); btn.style.borderColor=lp.buffer?color:'#333'; btn.textContent=(type==='drum'?'DRUM CH':'OTO CH')+ch+(lp.buffer?' — '+((lp.buffer.trimEnd-lp.buffer.trimStart)/1000).toFixed(1)+'s':' — empty'); if(lp.buffer) btn.onclick=()=>saveLoop(ch,type); list.appendChild(btn); }); document.getElementById('cogModal').classList.add('open'); }
function closeCog(){ document.getElementById('cogModal').classList.remove('open'); }

async function saveLoop(ch, type){
  const lp=type==='drum'?drumLooper[ch]:otoLooper[ch]; if(!lp||!lp.buffer)return;
  const trimStart=lp.buffer.trimStart/1000, trimEnd=lp.buffer.trimEnd/1000, dur=trimEnd-trimStart;
  const sr=44100; const offCtx=new OfflineAudioContext(1,Math.ceil(sr*dur),sr);
  lp.buffer.events.filter(ev=>ev.t/1000>=trimStart&&ev.t/1000<=trimEnd&&ev.kind==='drum').forEach(ev=>{ renderDrumOffline(offCtx,ev.type,ev.t/1000-trimStart); });
  const rendered=await offCtx.startRendering();
  const wav=audioBufferToWav(rendered);
  const url=URL.createObjectURL(wav);
  const a=document.createElement('a'); a.href=url; a.download=`beast-${type}-ch${ch}.wav`; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),4000); closeCog();
}

function renderDrumOffline(offCtx,type,t){
  const g=offCtx.createGain(); g.connect(offCtx.destination);
  const osc=offCtx.createOscillator(), noise=offCtx.createBufferSource();
  if(type==='kick'){ osc.frequency.setValueAtTime(150,t); osc.frequency.exponentialRampToValueAtTime(0.01,t+0.5); g.gain.setValueAtTime(1,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.5); osc.connect(g); osc.start(t); osc.stop(t+0.5); }
  else if(type==='snare'||type==='clap'){ const buf=offCtx.createBuffer(1,offCtx.sampleRate*0.2,offCtx.sampleRate); const d=buf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1; noise.buffer=buf; const f=offCtx.createBiquadFilter(); f.type=type==='snare'?'bandpass':'highpass'; f.frequency.value=type==='snare'?1000:1500; g.gain.setValueAtTime(type==='clap'?0.7:1,t); g.gain.exponentialRampToValueAtTime(0.01,t+(type==='clap'?0.3:0.2)); noise.connect(f); f.connect(g); noise.start(t); }
  else if(type==='hat'){ const buf=offCtx.createBuffer(1,offCtx.sampleRate*0.05,offCtx.sampleRate); const d=buf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1; noise.buffer=buf; const f=offCtx.createBiquadFilter(); f.type='highpass'; f.frequency.value=7000; g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.01,t+0.05); noise.connect(f); f.connect(g); noise.start(t); }
}

function audioBufferToWav(buffer){
  const numCh=buffer.numberOfChannels,sr=buffer.sampleRate,len=buffer.length;
  const out=new Float32Array(len*numCh);
  for(let c=0;c<numCh;c++){ const data=buffer.getChannelData(c); for(let i=0;i<len;i++) out[i*numCh+c]=data[i]; }
  const pcm=new Int16Array(out.length);
  for(let i=0;i<out.length;i++) pcm[i]=Math.max(-32768,Math.min(32767,Math.round(out[i]*32767)));
  const wavBuf=new ArrayBuffer(44+pcm.byteLength); const view=new DataView(wavBuf);
  const wc=(o,v)=>view.setUint32(o,v,true), ws=(o,v)=>view.setUint16(o,v,true);
  [...'RIFF'].forEach((c,i)=>view.setUint8(i,c.charCodeAt(0))); wc(4,36+pcm.byteLength);
  [...'WAVE'].forEach((c,i)=>view.setUint8(8+i,c.charCodeAt(0))); [...'fmt '].forEach((c,i)=>view.setUint8(12+i,c.charCodeAt(0)));
  wc(16,16); ws(20,1); ws(22,numCh); wc(24,sr); wc(28,sr*numCh*2); ws(32,numCh*2); ws(34,16);
  [...'data'].forEach((c,i)=>view.setUint8(36+i,c.charCodeAt(0))); wc(40,pcm.byteLength);
  new Int16Array(wavBuf,44).set(pcm);
  return new Blob([wavBuf],{type:'audio/wav'});
}
